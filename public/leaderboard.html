<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<script src="/socket.io/socket.io.js"></script>
</head>

<body>

<h1>House Leaderboard</h1>

<h2>Gryffindor: <span id="gryffindor">0</span></h2>
<h2>Hufflepuff: <span id="hufflepuff">0</span></h2>
<h2>Ravenclaw: <span id="ravenclaw">0</span></h2>
<h2>Slytherin: <span id="slytherin">0</span></h2>

<button onclick="window.location.href='index.html'">Home</button>
<button id="resetBtn">Reset Scores</button>

<script>
const socket = io();

socket.on('scoresUpdated', scores => {
  document.getElementById('gryffindor').textContent = scores.gryffindor;
  document.getElementById('hufflepuff').textContent = scores.hufflepuff;
  document.getElementById('ravenclaw').textContent = scores.ravenclaw;
  document.getElementById('slytherin').textContent = scores.slytherin;
});

document.getElementById('resetBtn').onclick = () => {
  socket.emit('resetScores');
};
</script>

</body>
</html>
