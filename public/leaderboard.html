<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        h1, h2 {
            margin-bottom: 12px;
        }
        .nav-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .nav-row button,
        .nav-row a {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #2f6f9d;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }
        .leaderboard {
            max-width: 640px;
            padding: 18px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,.08);
        }
        .house-row {
            display: grid;
            grid-template-columns: 1fr 96px;
            gap: 12px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e5e8ed;
        }
        .house-row:last-child {
            border-bottom: none;
        }
        .house-name {
            font-weight: 700;
            text-transform: capitalize;
        }
        .house-score {
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
        }
        .gryffindor { background: #7f0909; color: white}
        .hufflepuff { background: #ecb939; color: white; }
        .ravenclaw { background: #0e1a40; color: white}
        .slytherin { background: #2a623d; color: white }
    </style>
</head>
<body>
    <div class="nav-row">
        <a href="index.html">Home</a>
        <button onclick="window.location.href='timer.html'">Timer page</button>
    </div>

    <section class="leaderboard" aria-labelledby="leaderboard-title">
        <h1 id="leaderboard-title">House Leaderboard</h1>
        <div class="house-row gryffindor">
            <div class="house-name">Gryffindor</div>
            <div class="house-score" id="score-gryffindor">0</div>
        </div>
        <div class="house-row hufflepuff">
            <div class="house-name">Hufflepuff</div>
            <div class="house-score" id="score-hufflepuff">0</div>
        </div>
        <div class="house-row ravenclaw">
            <div class="house-name">Ravenclaw</div>
            <div class="house-score" id="score-ravenclaw">0</div>
        </div>
        <div class="house-row slytherin">
            <div class="house-name">Slytherin</div>
            <div class="house-score" id="score-slytherin">0</div>
        </div>
    </section>

    <button id="reset-scores-btn" type="button" style="margin-top:18px; padding: 10px 16px; border-radius: 10px; background:#2f6f9d; color:#fff; border:none; cursor:pointer;">Reset scores</button>

    <script>
        const SCORE_KEY = 'houseScores';
        const defaultScores = {
            gryffindor: 0,
            hufflepuff: 0,
            ravenclaw: 0,
            slytherin: 0
        };

        function getScores() {
            const stored = localStorage.getItem(SCORE_KEY);
            return stored ? JSON.parse(stored) : defaultScores;
        }

        function updateScoreDisplay(house, value) {
            const element = document.getElementById(`score-${house}`);
            if (element) {
                element.textContent = value;
            }
        }

        function loadScores() {
            const scores = getScores();
            Object.entries(scores).forEach(([house, value]) => updateScoreDisplay(house, value));
        }

        function resetScores() {
            localStorage.setItem(SCORE_KEY, JSON.stringify(defaultScores));
            loadScores();
        }

        document.getElementById('reset-scores-btn').addEventListener('click', resetScores);

        loadScores();
    </script>
</body>
</html>
