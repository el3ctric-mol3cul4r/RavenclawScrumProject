<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Countdown Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Covid-19 on cruise ships</h1>
    <div class="timer-container"></div>
    <div id = "subjects"></div>
    <div id = "navigation"></div>
        <h1>Game Timer</h1>
        <div id="timer-display">05:00</div>
        <button id="reset-timer-btn" class="reset-btn hidden">New Game</button>
        <div id="status">Game starting...</div>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2>Time's Up!</h2>
            <p>Your game time has expired.</p>
            <button id="close-modal-btn">Continue</button>
        </div>
    </div>

    <script src="timer.js"></script>
    <script src="script.js"></script>
</body>
</html>
